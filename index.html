<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FINGER SLOW</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00fff7;
    --green: #39ff14;
    --red: #ff2d55;
    --orange: #ff8c00;
    --purple: #bf00ff;
    --gold: #ffd700;
    --bg: #000000;
    --core-color: var(--cyan);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    cursor: none;
    user-select: none;
  }

  #canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px 0;
    pointer-events: none;
    z-index: 10;
  }
  #timer {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow: 0 0 12px #fff, 0 0 30px #fff;
    transition: color 0.4s, text-shadow 0.4s;
    font-family: 'Share Tech Mono', monospace;
  }
  #timer.descending {
    color: var(--red);
    text-shadow: 0 0 12px var(--red), 0 0 40px var(--red);
  }
  #speed-indicator {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.55rem, 1.8vw, 0.7rem);
    letter-spacing: 0.15em;
    opacity: 0.5;
    color: #fff;
  }

  /* ── GHOST HAND ONBOARDING ── */
  #onboarding {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 55;
    pointer-events: none;
  }
  #onboarding.hidden { display: none; }
  #ghost-hand {
    width: 80px;
    height: 80px;
    position: relative;
    animation: ghostPulse 2s ease-in-out infinite;
  }
  #ghost-hand svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
  }
  #hold-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.8rem, 3vw, 1.1rem);
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.6);
    margin-top: 24px;
    animation: holdPulse 2s ease-in-out infinite;
  }
  @keyframes ghostPulse {
    0%, 100% { opacity: 0.25; transform: scale(0.92) translateY(0); }
    50% { opacity: 0.6; transform: scale(1.05) translateY(-8px); }
  }
  @keyframes holdPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* ── FLASH MESSAGE ── */
  #flash {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
  }
  #flash-text {
    font-size: clamp(1.6rem, 6vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.2em;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.25s, transform 0.25s;
    text-align: center;
  }
  #flash-text.show { opacity: 1; transform: scale(1); }

  /* ── SCREEN FLASH (invert) ── */
  #invert-flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: difference;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 50;
    background: #000;
    padding: 40px 24px;
    overflow-y: auto;
  }
  .screen.hidden { display: none; }

  #title-screen h1 {
    font-size: clamp(2.2rem, 9vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, var(--cyan), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px var(--cyan));
  }
  #title-screen p {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.6rem, 2.2vw, 0.8rem);
    opacity: 0.4;
    letter-spacing: 0.15em;
    text-align: center;
    max-width: 300px;
    line-height: 1.8;
  }
  .btn {
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(0.65rem, 2.2vw, 0.85rem);
    letter-spacing: 0.3em;
    padding: 14px 32px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow: 0 0 14px rgba(0,255,247,0.2);
    border-radius: 2px;
  }
  .btn:hover, .btn:active {
    background: var(--cyan);
    color: #000;
    box-shadow: 0 0 28px var(--cyan);
    transform: scale(1.04);
  }
  .btn-red {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 14px rgba(255,45,85,0.2);
  }
  .btn-red:hover, .btn-red:active {
    background: var(--red);
    color: #000;
    box-shadow: 0 0 28px var(--red);
  }

  /* ── DEATH SCREEN ── */
  #death-screen {
    gap: 16px;
  }
  #death-screen h2 {
    font-size: clamp(1.8rem, 7vw, 3.5rem);
    font-weight: 900;
    color: var(--red);
    letter-spacing: 0.15em;
    text-shadow: 0 0 24px var(--red);
    text-align: center;
  }
  #death-time-container {
    text-align: center;
  }
  #death-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(2rem, 8vw, 4rem);
    color: #fff;
    letter-spacing: 0.1em;
  }
  #death-subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.55rem, 2vw, 0.7rem);
    opacity: 0.4;
    letter-spacing: 0.2em;
    margin-top: 4px;
  }
  #best-score-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.6rem, 2vw, 0.75rem);
    color: var(--gold);
    letter-spacing: 0.2em;
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
  }
  .death-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    width: 100%;
    max-width: 280px;
  }
  .death-buttons .btn {
    width: 100%;
    text-align: center;
  }

  /* ── REVIVE OVERLAY ── */
  #revive-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 70;
  }
  #revive-overlay.hidden { display: none; }
  #revive-overlay h3 {
    font-size: clamp(1rem, 4vw, 1.6rem);
    color: var(--cyan);
    letter-spacing: 0.15em;
    text-align: center;
    text-shadow: 0 0 20px var(--cyan);
  }
  #revive-overlay p {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.55rem, 2vw, 0.7rem);
    opacity: 0.5;
    letter-spacing: 0.15em;
    text-align: center;
  }

  /* ── LEADERBOARD SCREEN ── */
  #leaderboard-screen {
    gap: 12px;
    background: #000;
  }
  #leaderboard-screen h2 {
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-weight: 900;
    letter-spacing: 0.2em;
    background: linear-gradient(90deg, var(--cyan), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #weekly-countdown {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.5rem, 1.8vw, 0.65rem);
    opacity: 0.4;
    letter-spacing: 0.2em;
  }
  #leaderboard-list {
    width: 100%;
    max-width: 360px;
    max-height: 50vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid transparent;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.6rem, 2vw, 0.75rem);
    letter-spacing: 0.08em;
    gap: 12px;
  }
  .lb-row.top3 { border-left-color: var(--cyan); background: rgba(0,255,247,0.04); }
  .lb-row.me { border-left-color: var(--red); background: rgba(255,45,85,0.06); }
  .lb-rank { width: 30px; color: rgba(255,255,255,0.4); text-align: right; }
  .lb-flag { font-size: 1.1em; }
  .lb-name { flex: 1; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-time { color: var(--cyan); font-weight: 700; }
  #my-rank-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.6rem, 2vw, 0.75rem);
    color: var(--red);
    letter-spacing: 0.15em;
    text-shadow: 0 0 10px rgba(255,45,85,0.3);
    margin-top: 4px;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    gap: 16px;
  }
  #login-screen h3 {
    font-size: clamp(0.9rem, 3.5vw, 1.3rem);
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: 0 0 15px var(--cyan);
  }
  #email-input:focus, #nickname-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,255,247,0.2);
  }
  #email-input::placeholder, #nickname-input::placeholder {
    color: rgba(255,255,255,0.2);
  }
  #nickname-input {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    letter-spacing: 0.15em;
    padding: 12px 20px;
    text-align: center;
    outline: none;
    width: 280px;
    border-radius: 2px;
    transition: border-color 0.3s;
  }
  #title-account {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.5rem, 1.8vw, 0.6rem);
    opacity: 0.35;
    letter-spacing: 0.12em;
    text-align: center;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #title-account:hover { opacity: 0.6; }

  /* ── SCANLINE overlay ── */
  #scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 200;
    opacity: 0.4;
  }

  /* ── CORNER DECORATIONS ── */
  .corner {
    position: fixed;
    width: 20px; height: 20px;
    border-color: rgba(255,255,255,0.1);
    border-style: solid;
    pointer-events: none;
    z-index: 10;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  /* ── Share canvas (hidden) ── */
  #share-canvas { display: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<canvas id="share-canvas"></canvas>
<div id="scanlines"></div>
<div id="invert-flash"></div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="hud">
  <div id="timer">00:00</div>
  <div id="speed-indicator">1.0x</div>
</div>

<div id="flash"><div id="flash-text"></div></div>

<!-- ONBOARDING: Ghost Hand -->
<div id="onboarding" class="hidden">
  <div id="ghost-hand">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>
      <circle cx="50" cy="50" r="14" fill="rgba(255,255,255,0.15)"/>
      <ellipse cx="50" cy="44" rx="9" ry="12" fill="rgba(255,255,255,0.25)" rx="9"/>
      <rect x="45" y="44" width="10" height="20" rx="5" fill="rgba(255,255,255,0.2)"/>
    </svg>
  </div>
  <div id="hold-text">HOLD TO START</div>
</div>

<!-- TITLE SCREEN -->
<div class="screen" id="title-screen">
  <h1>FINGER<br>SLOW</h1>
  <p>KEEP YOUR FINGER ON THE CORE.<br>IF YOU LIFT — YOU LOSE.<br>HOW LONG CAN YOU HOLD?</p>
  <button class="btn" id="start-btn">BEGIN CHALLENGE</button>
  <button class="btn" id="leaderboard-btn" style="border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); box-shadow: none; font-size: clamp(0.5rem,1.8vw,0.65rem);">GLOBAL RANKING</button>
  <div id="title-account"></div>
</div>

<!-- LOGIN SCREEN -->
<div class="screen hidden" id="login-screen">
  <h3>SIGN IN</h3>
  <p style="font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,1.8vw,0.65rem);opacity:0.35;letter-spacing:0.15em;text-align:center;max-width:260px;line-height:1.8;">YOUR SCORES SYNC ACROSS ALL DEVICES</p>
  <input type="email" id="email-input" maxlength="60" placeholder="YOUR EMAIL" autocomplete="email" spellcheck="false" style="
    background:transparent;border:1.5px solid rgba(255,255,255,0.2);color:#fff;
    font-family:'Share Tech Mono',monospace;font-size:clamp(0.8rem,2.8vw,1rem);
    letter-spacing:0.08em;padding:12px 20px;text-align:center;outline:none;
    width:280px;border-radius:2px;transition:border-color 0.3s;
  ">
  <input type="text" id="nickname-input" maxlength="12" placeholder="NICKNAME" autocomplete="off" spellcheck="false">
  <button class="btn" id="login-confirm-btn">PLAY</button>
  <div id="login-error" style="font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,1.8vw,0.6rem);color:#ff2d55;letter-spacing:0.15em;opacity:0;height:16px;transition:opacity 0.3s;"></div>
</div>

<!-- DEATH SCREEN -->
<div class="screen hidden" id="death-screen">
  <h2>YOU LOST</h2>
  <div id="death-time-container">
    <div id="death-time">00:00</div>
    <div id="death-subtitle">MINUTES SURVIVED</div>
  </div>
  <div id="best-score-display"></div>
  <div class="death-buttons">
    <button class="btn" id="retry-btn">TRY AGAIN</button>
    <button class="btn" id="save-result-btn" style="border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); box-shadow: none;">SAVE RESULT</button>
    <button class="btn" id="ranking-btn" style="border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); box-shadow: none; font-size: clamp(0.5rem,1.8vw,0.6rem);">VIEW RANKING</button>
  </div>
</div>

<!-- REVIVE OVERLAY -->
<div id="revive-overlay" class="hidden">
  <h3>CONTINUE?</h3>
  <p>WATCH AD TO REVIVE FROM CURRENT TIME</p>
  <button class="btn" id="revive-yes-btn">WATCH AD</button>
  <button class="btn btn-red" id="revive-no-btn">GIVE UP</button>
</div>

<!-- LEADERBOARD SCREEN -->
<div class="screen hidden" id="leaderboard-screen">
  <h2>WEEKLY RANKING</h2>
  <div id="weekly-countdown">RESETS IN --:--:--</div>
  <div id="leaderboard-list"></div>
  <div id="my-rank-display"></div>
  <button class="btn" id="lb-back-btn" style="margin-top: 8px;">BACK</button>
</div>

<script>
// ════════════════════════════════════════════════════════
//  FINGER SLOW — Full Game Engine
// ════════════════════════════════════════════════════════

// ── AUDIO ENGINE (Procedural, No Files) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBounceSound(pitch = 440) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(pitch * 0.5, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

function playPeakChime() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 1.5);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 1.5);
}

function playCrashSound() {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 0.3;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  source.buffer = buffer;
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  source.connect(gain).connect(audioCtx.destination);
  source.start();
}

function playPhaseTransitionSound() {
  ensureAudio();
  [440, 554, 660].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.1 + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.1 + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.1);
    osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
  });
}

// ── CONSTANTS ──
const CORE_R = 34;
const TOTAL_TIME = 50 * 60 * 1000; // 50 minutes
const PEAK_TIME = 25 * 60 * 1000;  // 25 minutes

// Speed scaling thresholds (in ms)
const SPEED_STAGES = [
  { time: 0,              speed: 1.0, color: '#00fff7', sparkType: 'dot',     label: 'BASE'     },
  { time: 2  * 60 * 1000, speed: 1.2, color: '#39ff14', sparkType: 'ring',    label: 'RISING'   },
  { time: 5  * 60 * 1000, speed: 1.5, color: '#ff8c00', sparkType: 'cross',   label: 'HEATING'  },
  { time: 10 * 60 * 1000, speed: 2.0, color: '#bf00ff', sparkType: 'diamond', label: 'INTENSE'  },
  { time: 20 * 60 * 1000, speed: 2.5, color: '#ff2d55', sparkType: 'star',    label: 'PEAK'     },
  { time: 25 * 60 * 1000, speed: 2.5, color: '#ffd700', sparkType: 'star',    label: 'THE PEAK' },
];

// ── STATE ──
let state = {
  running: false,
  phase: 'idle', // idle, onboarding, playing
  elapsed: 0,
  touching: false,
  touchOnCore: false,
  fingerX: -999, fingerY: -999,
  coreX: 0, coreY: 0,
  velX: 0, velY: 0,
  lastTS: 0,
  currentSpeed: 1.0,
  currentGlowColor: '#00fff7',
  currentSparkType: 'dot',
  ascending: true,
  gameStarted: false,
};

let deathCounter = 0;
let reviveUsedThisSession = false;
let reviveElapsed = 0;
let nickname = localStorage.getItem('finger_nickname') || '';
let userEmail = localStorage.getItem('finger_email') || '';
let userCountryCode = '';
let bestScore = parseInt(localStorage.getItem('finger_best') || '0', 10);

// Unique player ID per device — solves duplicate nicknames
let playerId = localStorage.getItem('finger_player_id');
if (!playerId) {
  playerId = 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
  localStorage.setItem('finger_player_id', playerId);
}

// ── DOM ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const speedIndicator = document.getElementById('speed-indicator');
const flashText = document.getElementById('flash-text');
const invertFlash = document.getElementById('invert-flash');

// ── UTILITY ──
function fmt(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function fmtMinutes(ms) {
  return Math.floor(ms / 60000);
}

function fmtMinSec(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function getTotalSeconds(ms) {
  return Math.floor(ms / 1000);
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showFlash(txt, color = '#fff', duration = 1600) {
  flashText.textContent = txt;
  flashText.style.color = color;
  flashText.style.textShadow = `0 0 30px ${color}, 0 0 60px ${color}`;
  flashText.classList.add('show');
  setTimeout(() => flashText.classList.remove('show'), duration);
}

// ── SPEED/DIFFICULTY SYSTEM ──
function getEffectiveTime(elapsed) {
  // 0–25min ascending, 25–50min descending (mirror)
  if (elapsed <= PEAK_TIME) return elapsed;
  return TOTAL_TIME - elapsed; // mirrors back
}

function getStageForTime(effectiveTime) {
  let stage = SPEED_STAGES[0];
  for (let i = SPEED_STAGES.length - 1; i >= 0; i--) {
    if (effectiveTime >= SPEED_STAGES[i].time) {
      stage = SPEED_STAGES[i];
      break;
    }
  }
  return stage;
}

function updateDifficulty() {
  const eff = getEffectiveTime(state.elapsed);
  const stage = getStageForTime(eff);
  state.currentSpeed = stage.speed;
  state.currentGlowColor = stage.color;
  state.currentSparkType = stage.sparkType;
  state.ascending = state.elapsed <= PEAK_TIME;

  speedIndicator.textContent = stage.speed.toFixed(1) + 'x';

  // Timer color: white ascending, red descending
  if (state.ascending) {
    timerEl.classList.remove('descending');
  } else {
    timerEl.classList.add('descending');
  }
}

function getTimerDisplay() {
  if (state.ascending) {
    return fmt(state.elapsed);
  } else {
    // Descending: show remaining from 50 min with "-" prefix
    const remaining = TOTAL_TIME - state.elapsed;
    return '- ' + fmt(Math.max(0, remaining));
  }
}

// ── SPARKS SYSTEM ──
const sparks = [];
for (let i = 0; i < 50; i++) {
  sparks.push({
    angle: Math.random() * Math.PI * 2,
    r: CORE_R + Math.random() * 35,
    speed: 0.5 + Math.random() * 1.5,
    size: 1 + Math.random() * 2.5,
    life: Math.random(),
  });
}

function updateSparks(dt) {
  sparks.forEach(s => {
    s.angle += s.speed * dt * 0.003 * state.currentSpeed;
    s.life += dt * 0.001 * state.currentSpeed;
    if (s.life > 1) {
      s.life = 0;
      s.r = CORE_R + Math.random() * 35;
      s.speed = 0.5 + Math.random() * 1.5;
      s.size = 1 + Math.random() * 2.5;
    }
  });
}

function drawSparkShape(cx, cy, size, type, color, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;

  switch (type) {
    case 'dot':
      ctx.beginPath();
      ctx.arc(cx, cy, size, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'ring':
      ctx.beginPath();
      ctx.arc(cx, cy, size * 1.2, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 'cross':
      ctx.beginPath();
      ctx.moveTo(cx - size, cy); ctx.lineTo(cx + size, cy);
      ctx.moveTo(cx, cy - size); ctx.lineTo(cx, cy + size);
      ctx.stroke();
      break;
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(cx, cy - size * 1.5);
      ctx.lineTo(cx + size, cy);
      ctx.lineTo(cx, cy + size * 1.5);
      ctx.lineTo(cx - size, cy);
      ctx.closePath();
      ctx.fill();
      break;
    case 'star':
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 72 - 90) * Math.PI / 180;
        const r = i % 2 === 0 ? size * 1.5 : size * 0.6;
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      break;
  }
  ctx.globalAlpha = 1;
}

// ── WALL BOUNCE SPARKS ──
const wallSparks = [];

function spawnWallSparks(x, y) {
  for (let i = 0; i < 8; i++) {
    wallSparks.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 1,
      size: 1 + Math.random() * 3,
    });
  }
  playBounceSound(300 + Math.random() * 400);
}

function updateWallSparks(dt) {
  for (let i = wallSparks.length - 1; i >= 0; i--) {
    const s = wallSparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= dt * 0.003;
    if (s.life <= 0) wallSparks.splice(i, 1);
  }
}

function drawWallSparks() {
  wallSparks.forEach(s => {
    ctx.globalAlpha = s.life * 0.8;
    ctx.fillStyle = state.currentGlowColor;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── CORE MOVEMENT ──
function updateCore(dt) {
  const W = canvas.width, H = canvas.height;
  const margin = CORE_R + 10;
  const spd = state.currentSpeed;

  // Move core
  state.coreX += state.velX * dt * 0.06 * spd;
  state.coreY += state.velY * dt * 0.06 * spd;

  // Bounce off walls
  let bounced = false;
  if (state.coreX < margin) { state.velX = Math.abs(state.velX); state.coreX = margin; bounced = true; }
  if (state.coreX > W - margin) { state.velX = -Math.abs(state.velX); state.coreX = W - margin; bounced = true; }
  if (state.coreY < margin) { state.velY = Math.abs(state.velY); state.coreY = margin; bounced = true; }
  if (state.coreY > H - margin) { state.velY = -Math.abs(state.velY); state.coreY = H - margin; bounced = true; }

  if (bounced) {
    spawnWallSparks(state.coreX, state.coreY);
  }

  // Random direction changes that increase with speed
  if (Math.random() < 0.001 * spd * dt) {
    const angle = Math.random() * Math.PI * 2;
    const baseVel = 1.2 * spd;
    state.velX = Math.cos(angle) * baseVel;
    state.velY = Math.sin(angle) * baseVel;
  }

  // Check touch on core
  const dist = Math.hypot(state.fingerX - state.coreX, state.fingerY - state.coreY);
  state.touchOnCore = state.touching && dist <= CORE_R + 14;

  if (!state.touchOnCore && state.gameStarted) {
    die();
    return false;
  }
  return true;
}

// ── DRAW ──
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const color = state.currentGlowColor;

  // Draw orbital sparks
  sparks.forEach(s => {
    const sx = state.coreX + Math.cos(s.angle) * s.r;
    const sy = state.coreY + Math.sin(s.angle) * s.r;
    const alpha = (1 - s.life) * 0.85;
    drawSparkShape(sx, sy, s.size, state.currentSparkType, color, alpha);
  });

  // Draw wall sparks
  drawWallSparks();

  // Core glow
  const grd = ctx.createRadialGradient(state.coreX, state.coreY, CORE_R * 0.4, state.coreX, state.coreY, CORE_R * 3.5);
  grd.addColorStop(0, color + '55');
  grd.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(state.coreX, state.coreY, CORE_R * 3.5, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Core ring
  ctx.beginPath();
  ctx.arc(state.coreX, state.coreY, CORE_R, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = 24;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Core fill
  const inner = ctx.createRadialGradient(state.coreX, state.coreY, 0, state.coreX, state.coreY, CORE_R);
  inner.addColorStop(0, color + 'cc');
  inner.addColorStop(0.5, color + '44');
  inner.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(state.coreX, state.coreY, CORE_R, 0, Math.PI * 2);
  ctx.fillStyle = inner;
  ctx.fill();

  // Crosshair
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(state.coreX - 12, state.coreY); ctx.lineTo(state.coreX + 12, state.coreY);
  ctx.moveTo(state.coreX, state.coreY - 12); ctx.lineTo(state.coreX, state.coreY + 12);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Touch indicator
  if (state.touching && state.touchOnCore) {
    ctx.beginPath();
    ctx.arc(state.fingerX, state.fingerY, 22, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ── GAME LOOP ──
let lastStageIndex = -1;

function loop(ts) {
  if (!state.running) return;
  const dt = Math.min(ts - state.lastTS, 50);
  state.lastTS = ts;

  if (state.gameStarted) {
    state.elapsed += dt;
    updateDifficulty();

    // Check for stage transitions
    const eff = getEffectiveTime(state.elapsed);
    let stageIdx = 0;
    for (let i = SPEED_STAGES.length - 1; i >= 0; i--) {
      if (eff >= SPEED_STAGES[i].time) { stageIdx = i; break; }
    }
    if (stageIdx !== lastStageIndex) {
      if (lastStageIndex >= 0) {
        playPhaseTransitionSound();
        showFlash(SPEED_STAGES[stageIdx].label, SPEED_STAGES[stageIdx].color, 1500);
        vibrate([60, 30, 60]);
      }
      lastStageIndex = stageIdx;
    }

    // The Peak (25 min)
    if (state.ascending && state.elapsed >= PEAK_TIME && !state._peakPlayed) {
      state._peakPlayed = true;
      playPeakChime();
      showFlash('THE PEAK', '#ffd700', 3000);
      vibrate([100, 50, 100, 50, 200]);
    }

    // Win condition: survived 50 minutes
    if (state.elapsed >= TOTAL_TIME) {
      state.elapsed = TOTAL_TIME;
      win();
      return;
    }

    timerEl.textContent = getTimerDisplay();

    if (!updateCore(dt)) return;
  }

  updateSparks(dt);
  updateWallSparks(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── GAME OVER ──
function die() {
  state.running = false;
  state.gameStarted = false;
  deathCounter++;

  // Haptic: short strong vibration
  vibrate([150]);
  playCrashSound();

  // Check revive eligibility: every 3rd death, once per session
  if (deathCounter % 3 === 0 && !reviveUsedThisSession) {
    reviveElapsed = state.elapsed;
    showReviveOption();
    return;
  }

  showDeathScreen();
}

function win() {
  state.running = false;
  state.gameStarted = false;
  playPeakChime();
  vibrate([200, 100, 200, 100, 400]);

  // Show as full 50 min survive
  showDeathScreen(true);
}

function showReviveOption() {
  reviveOverlay.classList.remove('hidden');
  titleScreen.classList.add('hidden');
  deathScreen.classList.add('hidden');
}

function doRevive() {
  reviveOverlay.classList.add('hidden');
  reviveUsedThisSession = true;

  // Simulate ad watch delay
  showFlash('REVIVING...', '#00fff7', 1500);
  setTimeout(() => {
    state.running = true;
    state.gameStarted = true;
    state.elapsed = reviveElapsed;
    state.touching = true;
    state.touchOnCore = true;
    state.lastTS = performance.now();
    state.coreX = canvas.width / 2;
    state.coreY = canvas.height / 2;
    const angle = Math.random() * Math.PI * 2;
    state.velX = Math.cos(angle) * 1.2;
    state.velY = Math.sin(angle) * 1.2;
    lastStageIndex = -1;
    requestAnimationFrame(loop);
  }, 1600);
}

function showDeathScreen(isWin = false) {
  const totalSec = getTotalSeconds(state.elapsed);
  deathTimeEl.textContent = fmtMinSec(state.elapsed);
  deathSubtitle.textContent = isWin ? 'YOU SURVIVED THE ENTIRE CHALLENGE!' : 'TIME SURVIVED';

  if (isWin) {
    document.querySelector('#death-screen h2').textContent = 'VICTORY';
    document.querySelector('#death-screen h2').style.color = '#ffd700';
    document.querySelector('#death-screen h2').style.textShadow = '0 0 24px #ffd700';
  } else {
    document.querySelector('#death-screen h2').textContent = 'YOU LOST';
    document.querySelector('#death-screen h2').style.color = '#ff2d55';
    document.querySelector('#death-screen h2').style.textShadow = '0 0 24px #ff2d55';
  }

  // Best score
  const currentMs = state.elapsed;
  if (currentMs > bestScore) {
    bestScore = currentMs;
    localStorage.setItem('finger_best', String(bestScore));
    bestScoreDisplay.textContent = 'NEW BEST: ' + fmtMinSec(bestScore);
    // Sync best to Supabase account
    updatePlayerBest(getTotalSeconds(bestScore));
  } else {
    bestScoreDisplay.textContent = 'BEST: ' + fmtMinSec(bestScore);
  }

  deathScreen.classList.remove('hidden');
  titleScreen.classList.add('hidden');
  onboarding.classList.add('hidden');

  // Submit score in total seconds for precision
  submitScore(totalSec);
}

// ── GAME INIT ──
function initGameState() {
  state = {
    running: true,
    phase: 'onboarding',
    elapsed: 0,
    touching: false,
    touchOnCore: false,
    fingerX: -999, fingerY: -999,
    coreX: canvas.width / 2,
    coreY: canvas.height / 2,
    velX: 0, velY: 0,
    lastTS: performance.now(),
    currentSpeed: 1.0,
    currentGlowColor: '#00fff7',
    currentSparkType: 'dot',
    ascending: true,
    gameStarted: false,
    _peakPlayed: false,
  };
  const angle = Math.random() * Math.PI * 2;
  state.velX = Math.cos(angle) * 1.2;
  state.velY = Math.sin(angle) * 1.2;

  timerEl.className = '';
  timerEl.textContent = "00:00";
  speedIndicator.textContent = '1.0x';
  lastStageIndex = -1;

  titleScreen.classList.add('hidden');
  deathScreen.classList.add('hidden');
  reviveOverlay.classList.add('hidden');
  leaderboardScreen.classList.add('hidden');
  loginScreen.classList.add('hidden');

  // Show onboarding ghost hand
  onboarding.classList.remove('hidden');
}

function startProcess() {
  ensureAudio();

  // Re-read from localStorage
  if (!userEmail) userEmail = localStorage.getItem('finger_email') || '';
  if (!nickname) nickname = localStorage.getItem('finger_nickname') || '';

  // Need login?
  if (!userEmail || !nickname) {
    showLoginScreen(() => {
      initGameState();
      requestAnimationFrame(loop);
    });
    return;
  }

  initGameState();
  requestAnimationFrame(loop);
}

let _loginCallback = null;

function showLoginScreen(callback) {
  _loginCallback = callback;
  titleScreen.classList.add('hidden');
  deathScreen.classList.add('hidden');
  loginScreen.classList.remove('hidden');
  emailInput.value = userEmail;
  nicknameInput.value = nickname;
  emailInput.focus();
  loginError.style.opacity = '0';
}

function showLoginError(msg) {
  loginError.textContent = msg;
  loginError.style.opacity = '1';
}

async function confirmLogin() {
  const email = emailInput.value.trim().toLowerCase();
  const nick = nicknameInput.value.trim().toUpperCase();

  // Validate email
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailInput.style.borderColor = '#ff2d55';
    showLoginError('ENTER A VALID EMAIL');
    return;
  }
  // Validate nickname
  if (nick.length < 2) {
    nicknameInput.style.borderColor = '#ff2d55';
    showLoginError('NICKNAME: 2 CHARS MIN');
    return;
  }

  userEmail = email;
  nickname = nick;

  try {
    localStorage.setItem('finger_email', userEmail);
    localStorage.setItem('finger_nickname', nickname);
  } catch(e) {}

  // Try to find existing account by email in Supabase
  await syncAccountFromEmail();

  loginScreen.classList.add('hidden');
  updateTitleAccount();

  if (_loginCallback) {
    _loginCallback();
    _loginCallback = null;
  }
}

// Sync account: if this email already exists in Supabase, load their player_id and best score
async function syncAccountFromEmail() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/players?email=eq.${encodeURIComponent(userEmail)}&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();

    if (rows.length > 0) {
      // Existing account found — restore their player_id and best score
      const account = rows[0];
      playerId = account.player_id;
      localStorage.setItem('finger_player_id', playerId);
      nickname = account.nickname || nickname;
      localStorage.setItem('finger_nickname', nickname);

      if (account.best_seconds > bestScore / 1000) {
        bestScore = account.best_seconds * 1000;
        localStorage.setItem('finger_best', String(bestScore));
      }
    } else {
      // New account — register this email with current player_id
      await fetch(`${SUPABASE_URL}/rest/v1/players`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({
          player_id: playerId,
          email: userEmail,
          nickname: nickname,
          best_seconds: Math.floor(bestScore / 1000),
          created_at: new Date().toISOString(),
        }),
      });
    }
  } catch(e) {
    // Offline — continue with local data
  }
}

// Update player record in Supabase when best score changes
async function updatePlayerBest(totalSeconds) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/players?player_id=eq.${playerId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        nickname: nickname,
        best_seconds: totalSeconds,
      }),
    });
  } catch(e) {}
}

function updateTitleAccount() {
  if (userEmail && nickname) {
    titleAccount.textContent = nickname + ' · ' + userEmail;
    titleAccount.onclick = logout;
  } else {
    titleAccount.textContent = '';
  }
}

function logout() {
  if (!confirm('Sign out? Your local scores will be kept.')) return;
  userEmail = '';
  nickname = '';
  localStorage.removeItem('finger_email');
  localStorage.removeItem('finger_nickname');
  updateTitleAccount();
}

document.getElementById('login-confirm-btn').addEventListener('click', confirmLogin);
emailInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') nicknameInput.focus();
});
nicknameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmLogin();
});

// Show account on title screen at startup
updateTitleAccount();

// ── TOUCH/INPUT ──
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onDown(e) {
  e.preventDefault();
  ensureAudio();
  const pos = getPos(e);
  state.fingerX = pos.x;
  state.fingerY = pos.y;
  state.touching = true;

  // If in onboarding phase, check if touching core to start
  if (state.phase === 'onboarding' && state.running) {
    const dist = Math.hypot(pos.x - state.coreX, pos.y - state.coreY);
    if (dist <= CORE_R + 14) {
      state.phase = 'playing';
      state.gameStarted = true;
      state.touchOnCore = true;
      onboarding.classList.add('hidden');
      state.lastTS = performance.now();
      playBounceSound(660);
    }
  }
}

function onMove(e) {
  e.preventDefault();
  if (!state.touching) return;
  const pos = getPos(e);
  state.fingerX = pos.x;
  state.fingerY = pos.y;
}

function onUp(e) {
  e.preventDefault();
  state.touching = false;
  state.fingerX = -999;
  state.fingerY = -999;
  if (state.running && state.gameStarted) die();
}

canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp, { passive: false });
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);

document.getElementById('retry-btn').addEventListener('click', startProcess);

  generateShareImage();
});

function generateShareImage() {
  const sc = shareCanvas;
  const w = 600, h = 900;
  sc.width = w; sc.height = h;
  const c = sc.getContext('2d');

  // Background
  c.fillStyle = '#000';
  c.fillRect(0, 0, w, h);

  // Border glow
  c.strokeStyle = '#ff2d55';
  c.lineWidth = 2;
  c.shadowColor = '#ff2d55';
  c.shadowBlur = 20;
  c.strokeRect(20, 20, w - 40, h - 40);
  c.shadowBlur = 0;

  // Corner decorations
  const corners = [[30, 30, 1, 1], [w - 30, 30, -1, 1], [30, h - 30, 1, -1], [w - 30, h - 30, -1, -1]];
  corners.forEach(([cx, cy, dx, dy]) => {
    c.strokeStyle = 'rgba(255,255,255,0.15)';
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(cx, cy + 15 * dy); c.lineTo(cx, cy); c.lineTo(cx + 15 * dx, cy);
    c.stroke();
  });

  // Scanlines
  c.globalAlpha = 0.04;
  for (let y = 0; y < h; y += 4) {
    c.fillStyle = '#fff';
    c.fillRect(0, y, w, 1);
  }
  c.globalAlpha = 1;

  // Title
  c.font = '900 42px Orbitron, sans-serif';
  c.textAlign = 'center';
  const titleGrad = c.createLinearGradient(w / 2 - 100, 0, w / 2 + 100, 0);
  titleGrad.addColorStop(0, '#00fff7');
  titleGrad.addColorStop(1, '#ff2d55');
  c.fillStyle = titleGrad;
  c.fillText('FINGER SLOW', w / 2, 130);

  // Separator line
  c.strokeStyle = 'rgba(255,255,255,0.1)';
  c.lineWidth = 1;
  c.beginPath(); c.moveTo(100, 170); c.lineTo(w - 100, 170); c.stroke();

  // Core visual (circle glow)
  const coreY = 320;
  const grd = c.createRadialGradient(w / 2, coreY, 10, w / 2, coreY, 80);
  grd.addColorStop(0, '#00fff755');
  grd.addColorStop(1, 'transparent');
  c.fillStyle = grd;
  c.beginPath(); c.arc(w / 2, coreY, 80, 0, Math.PI * 2); c.fill();

  c.beginPath();
  c.arc(w / 2, coreY, 34, 0, Math.PI * 2);
  c.strokeStyle = '#00fff7';
  c.lineWidth = 2.5;
  c.shadowColor = '#00fff7';
  c.shadowBlur = 24;
  c.stroke();
  c.shadowBlur = 0;

  // Time survived — show only minutes on share image to keep mystery
  const mins = fmtMinutes(state.elapsed);
  c.font = '900 72px "Share Tech Mono", monospace';
  c.fillStyle = '#fff';
  c.fillText(mins + ' MIN', w / 2, 500);

  c.font = '400 14px "Share Tech Mono", monospace';
  c.fillStyle = 'rgba(255,255,255,0.4)';
  c.fillText('MINUTES SURVIVED', w / 2, 535);

  // Best
  c.font = '700 16px "Share Tech Mono", monospace';
  c.fillStyle = '#ffd700';
  c.fillText('BEST: ' + fmtMinSec(bestScore), w / 2, 590);

  // Separator
  c.strokeStyle = 'rgba(255,255,255,0.06)';
  c.beginPath(); c.moveTo(100, 630); c.lineTo(w - 100, 630); c.stroke();

  // Challenge text
  c.font = '700 13px Orbitron, sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.3)';
  c.letterSpacing = '0.2em';
  c.fillText('CAN YOU BEAT MY TIME?', w / 2, 680);

  // Nickname
  if (nickname) {
    c.font = '400 12px "Share Tech Mono", monospace';
    c.fillStyle = 'rgba(0,255,247,0.5)';
    c.fillText('PLAYER: ' + nickname, w / 2, 780);
  }

  // Bottom branding
  c.font = '400 10px "Share Tech Mono", monospace';
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.fillText('FINGER SLOW — HOW LONG CAN YOU HOLD?', w / 2, h - 50);

  // Trigger download
  sc.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'finger-slow-' + mins + 'min.png';
    a.click();
    URL.revokeObjectURL(url);
  });
}

// ── SUPABASE LEADERBOARD ──
const SUPABASE_URL = 'https://YOUR_SUPABASE_URL.supabase.co';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

// Get current week's Monday 00:00 UTC as the week identifier
function getCurrentWeekStart() {
  const now = new Date();
  const day = now.getUTCDay();
  const diff = day === 0 ? 6 : day - 1; // Monday = 0 offset
  const monday = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - diff, 0, 0, 0));
  return monday.toISOString().split('T')[0]; // "2026-03-30"
}

async function getCountryCode() {
  if (userCountryCode && userCountryCode !== 'XX') return userCountryCode;

  // Try from localStorage first (cached from a previous session)
  const cached = localStorage.getItem('finger_country');
  if (cached && cached !== 'XX') {
    userCountryCode = cached;
    return userCountryCode;
  }

  // Try multiple free IP-location APIs as fallbacks
  const apis = [
    { url: 'https://ip2c.org/s', parse: (txt) => { const parts = txt.split(';'); return parts[0] === '1' ? parts[1] : null; } },
    { url: 'https://ipwho.is/', parse: (json) => json.country_code || null },
    { url: 'https://freeipapi.com/api/json', parse: (json) => json.countryCode || null },
    { url: 'https://ipapi.co/json/', parse: (json) => json.country_code || null },
  ];

  for (const api of apis) {
    try {
      const res = await fetch(api.url, { signal: AbortSignal.timeout(3000) });
      let data;
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('json')) {
        data = await res.json();
      } else {
        data = await res.text();
      }
      const code = api.parse(data);
      if (code && code.length === 2) {
        userCountryCode = code.toUpperCase();
        localStorage.setItem('finger_country', userCountryCode);
        return userCountryCode;
      }
    } catch {
      continue;
    }
  }

  userCountryCode = 'XX';
  return userCountryCode;
}

function countryToEmoji(code) {
  if (!code || code === 'XX') return '🌍';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

async function submitScore(totalSeconds) {
  try {
    const cc = await getCountryCode();
    const weekStart = getCurrentWeekStart();

    // First check if player already has a score this week
    const existing = await fetch(
      `${SUPABASE_URL}/rest/v1/weekly_scores?player_id=eq.${playerId}&week_start=eq.${weekStart}&select=total_seconds`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
      }
    );
    const rows = await existing.json();

    // Only submit if new score is higher (or no score yet)
    if (rows.length > 0 && rows[0].total_seconds >= totalSeconds) return;

    await fetch(`${SUPABASE_URL}/rest/v1/weekly_scores`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify({
        player_id: playerId,
        week_start: weekStart,
        nickname: nickname || 'ANON',
        country_code: cc,
        total_seconds: totalSeconds,
        created_at: new Date().toISOString(),
      }),
    });
  } catch (e) {
    // Silently fail — offline play is fine
  }
}

async function fetchLeaderboard() {
  try {
    const weekStart = getCurrentWeekStart();
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/weekly_scores?week_start=eq.${weekStart}&select=*&order=total_seconds.desc&limit=50`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
      }
    );
    return await res.json();
  } catch {
    return [];
  }
}

function updateWeeklyCountdown() {
  const now = new Date();
  const nextMonday = new Date(now);
  nextMonday.setUTCDate(now.getUTCDate() + ((1 + 7 - now.getUTCDay()) % 7 || 7));
  nextMonday.setUTCHours(0, 0, 0, 0);
  const diff = nextMonday - now;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  weeklyCountdown.textContent = `RESETS IN ${d}D ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function showLeaderboard(fromScreen = 'title') {
  leaderboardScreen.classList.remove('hidden');
  titleScreen.classList.add('hidden');
  deathScreen.classList.add('hidden');
  leaderboardScreen.dataset.from = fromScreen;

  leaderboardList.innerHTML = '<div style="opacity:0.3;text-align:center;padding:40px;font-family:Share Tech Mono,monospace;font-size:0.7rem;letter-spacing:0.15em;">LOADING...</div>';

  updateWeeklyCountdown();
  const countdownInterval = setInterval(updateWeeklyCountdown, 1000);
  leaderboardScreen.dataset.interval = countdownInterval;

  const data = await fetchLeaderboard();

  if (!data || !data.length) {
    leaderboardList.innerHTML = '<div style="opacity:0.3;text-align:center;padding:40px;font-family:Share Tech Mono,monospace;font-size:0.7rem;letter-spacing:0.15em;">NO SCORES YET<br>BE THE FIRST!</div>';
    myRankDisplay.textContent = '';
    return;
  }

  leaderboardList.innerHTML = '';
  let myRank = -1;
  data.forEach((entry, i) => {
    const row = document.createElement('div');
    const isMe = entry.player_id === playerId;
    row.className = 'lb-row' + (i < 3 ? ' top3' : '') + (isMe ? ' me' : '');
    row.innerHTML = `
      <span class="lb-rank">#${i + 1}</span>
      <span class="lb-flag">${countryToEmoji(entry.country_code)}</span>
      <span class="lb-name">${entry.nickname}</span>
      <span class="lb-time">${Math.floor(entry.total_seconds/60)}:${String(entry.total_seconds%60).padStart(2,'0')}</span>
    `;
    leaderboardList.appendChild(row);
    if (entry.player_id === playerId && myRank === -1) myRank = i + 1;
  });

  if (myRank > 0) {
    myRankDisplay.textContent = `YOU ARE #${myRank} WORLDWIDE`;
  } else {
    myRankDisplay.textContent = '';
  }
}

document.getElementById('leaderboard-btn').addEventListener('click', () => showLeaderboard('title'));
document.getElementById('ranking-btn').addEventListener('click', () => showLeaderboard('death'));
document.getElementById('lb-back-btn').addEventListener('click', () => {
  const from = leaderboardScreen.dataset.from || 'title';
  leaderboardScreen.classList.add('hidden');
  if (leaderboardScreen.dataset.interval) clearInterval(parseInt(leaderboardScreen.dataset.interval));
  if (from === 'death') deathScreen.classList.remove('hidden');
  else titleScreen.classList.remove('hidden');
});

state.coreY = canvas.height / 2;
draw();

  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
