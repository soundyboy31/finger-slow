<style>
:root{--cyan:#00fff7;--green:#39ff14;--red:#ff2d55;--orange:#ff8c00;--purple:#bf00ff;--gold:#ffd700}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-8px,4px)}20%{transform:translate(6px,-6px)}30%{transform:translate(-4px,8px)}40%{transform:translate(8px,-2px)}50%{transform:translate(-6px,6px)}60%{transform:translate(4px,-8px)}70%{transform:translate(-8px,2px)}80%{transform:translate(6px,6px)}90%{transform:translate(-2px,-4px)}}

<script>

function getRoast(s){let p;if(s<5)p=ROASTS.tiny;else if(s<15)p=ROASTS.short;else if(s<30)p=ROASTS.ok;else if(s<60)p=ROASTS.decent;else if(s<180)p=ROASTS.good;else p=ROASTS.epic;return p[Math.floor(Math.random()*p.length)]}
const MILESTONES=[{at:5,text:"5 SEC",color:"#fff"},{at:10,text:"10!",color:"#00fff7"},{at:15,text:"15 SEC",color:"#39ff14"},{at:30,text:"30!",color:"#ff8c00"},{at:45,text:"45 SEC",color:"#bf00ff"},{at:60,text:"1 MIN!",color:"#ff2d55"},{at:90,text:"90 SEC",color:"#00fff7"},{at:120,text:"2 MIN!",color:"#ffd700"},{at:180,text:"3 MIN!",color:"#ff2d55"},{at:300,text:"5 MIN!",color:"#ffd700"},{at:600,text:"10 MIN!",color:"#ff2d55"}];
const AudioCtx=window.AudioContext||window.webkitAudioContext;let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();if(audioCtx.state==='suspended')audioCtx.resume()}
function playBounceSound(pitch=440){ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(pitch,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(pitch*.5,audioCtx.currentTime+.1);g.gain.setValueAtTime(.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.1);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.1)}
function playMilestoneSound(freq){ensureAudio();const t=audioCtx.currentTime;[freq,freq*1.25,freq*1.5].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*.07);g.gain.linearRampToValueAtTime(.1,t+i*.07+.03);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.3);o.connect(g).connect(audioCtx.destination);o.start(t+i*.07);o.stop(t+i*.07+.3)})}
function playPeakChime(){ensureAudio();const t=audioCtx.currentTime;const h=audioCtx.createOscillator(),hg=audioCtx.createGain();h.type='sawtooth';h.frequency.setValueAtTime(110,t);h.frequency.exponentialRampToValueAtTime(220,t+1.5);h.frequency.exponentialRampToValueAtTime(110,t+3);hg.gain.setValueAtTime(0,t);hg.gain.linearRampToValueAtTime(.07,t+.3);hg.gain.exponentialRampToValueAtTime(.001,t+3.5);const hf=audioCtx.createBiquadFilter();hf.type='lowpass';hf.frequency.setValueAtTime(400,t);hf.frequency.linearRampToValueAtTime(900,t+1.5);h.connect(hf).connect(hg).connect(audioCtx.destination);h.start(t);h.stop(t+3.5);[1047,1319,1568,2093].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;const l=audioCtx.createOscillator(),lg=audioCtx.createGain();l.type='sine';l.frequency.value=2+i*.5;lg.gain.value=3;l.connect(lg).connect(o.frequency);l.start(t+i*.2);l.stop(t+4);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.035,t+i*.2+.1);g.gain.exponentialRampToValueAtTime(.001,t+4);o.connect(g).connect(audioCtx.destination);o.start(t+i*.2);o.stop(t+4)})}
function playCrashSound(){ensureAudio();const t=audioCtx.currentTime;const s=audioCtx.createOscillator(),sg=audioCtx.createGain();s.type='sine';s.frequency.setValueAtTime(55,t);s.frequency.exponentialRampToValueAtTime(15,t+.7);sg.gain.setValueAtTime(.35,t);sg.gain.exponentialRampToValueAtTime(.001,t+.7);s.connect(sg).connect(audioCtx.destination);s.start(t);s.stop(t+.7);const c=audioCtx.createOscillator(),cg=audioCtx.createGain();c.type='square';c.frequency.setValueAtTime(180,t);c.frequency.exponentialRampToValueAtTime(40,t+.25);cg.gain.setValueAtTime(.1,t);cg.gain.exponentialRampToValueAtTime(.001,t+.25);const cf=audioCtx.createBiquadFilter();cf.type='lowpass';cf.frequency.value=600;c.connect(cf).connect(cg).connect(audioCtx.destination);c.start(t);c.stop(t+.25);const nl=audioCtx.sampleRate*.6,nb=audioCtx.createBuffer(1,nl,audioCtx.sampleRate),nd=nb.getChannelData(0);for(let i=0;i<nl;i++)nd[i]=(Math.random()*2-1)*Math.pow(1-i/nl,1.5);const ns=audioCtx.createBufferSource(),ng=audioCtx.createGain(),nf=audioCtx.createBiquadFilter();nf.type='highpass';nf.frequency.setValueAtTime(2000,t);nf.frequency.exponentialRampToValueAtTime(200,t+.6);ns.buffer=nb;ng.gain.setValueAtTime(.2,t);ng.gain.exponentialRampToValueAtTime(.001,t+.6);ns.connect(nf).connect(ng).connect(audioCtx.destination);ns.start(t);const a=audioCtx.createOscillator(),ag=audioCtx.createGain();a.type='sawtooth';a.frequency.setValueAtTime(500,t+.04);a.frequency.exponentialRampToValueAtTime(80,t+.45);ag.gain.setValueAtTime(.05,t+.04);ag.gain.exponentialRampToValueAtTime(.001,t+.45);const af=audioCtx.createBiquadFilter();af.type='lowpass';af.frequency.value=800;a.connect(af).connect(ag).connect(audioCtx.destination);a.start(t+.04);a.stop(t+.45)}

document.getElementById('save-result-btn').addEventListener('click',()=>{const sc=shareCanvas,w=600,h=900;sc.width=w;sc.height=h;const c=sc.getContext('2d');c.fillStyle='#000';c.fillRect(0,0,w,h);c.strokeStyle='#ff2d55';c.lineWidth=2;c.shadowColor='#ff2d55';c.shadowBlur=20;c.strokeRect(20,20,w-40,h-40);c.shadowBlur=0;c.globalAlpha=.04;for(let y=0;y<h;y+=4){c.fillStyle='#fff';c.fillRect(0,y,w,1)}c.globalAlpha=1;c.font='900 42px Orbitron,sans-serif';c.textAlign='center';const tg=c.createLinearGradient(w/2-100,0,w/2+100,0);tg.addColorStop(0,'#00fff7');tg.addColorStop(1,'#ff2d55');c.fillStyle=tg;c.fillText('FINGER SLOW',w/2,120);const sec=getTotalSeconds(state.elapsed);c.font='900 96px "Share Tech Mono",monospace';c.fillStyle='#fff';c.fillText(sec,w/2,300);c.font='700 18px "Share Tech Mono",monospace';c.fillStyle='rgba(255,255,255,.4)';c.fillText('SECONDS',w/2,340);const roast=getRoast(sec);c.font='400 14px "Share Tech Mono",monospace';c.fillStyle='#00fff7';const words=roast.split(' ');let lines=[],line='';words.forEach(word=>{if((line+word).length>30){lines.push(line.trim());line=''}line+=word+' '});if(line.trim())lines.push(line.trim());lines.forEach((l,i)=>c.fillText(l,w/2,420+i*22));c.font='700 16px "Share Tech Mono",monospace';c.fillStyle='#ffd700';c.fillText('BEST: '+getTotalSeconds(bestScore)+'s',w/2,520);c.font='400 12px "Share Tech Mono",monospace';c.fillStyle='rgba(255,255,255,.2)';c.fillText('ATTEMPT #'+totalDeaths,w/2,560);c.font='700 14px Orbitron,sans-serif';c.fillStyle='rgba(255,255,255,.3)';c.fillText('CAN YOU BEAT MY TIME?',w/2,660);if(nickname){c.font='400 12px "Share Tech Mono",monospace';c.fillStyle='rgba(0,255,247,.4)';c.fillText(nickname,w/2,720)}c.font='400 10px "Share Tech Mono",monospace';c.fillStyle='rgba(255,255,255,.12)';c.fillText('FINGER SLOW \u2014 HOW MANY SECONDS CAN YOU SURVIVE?',w/2,h-45);sc.toBlob(blob=>{const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='finger-slow-'+sec+'s.png';a.click();URL.revokeObjectURL(u)})});
const SUPABASE_URL='https://YOUR_SUPABASE_URL.supabase.co';
const SUPABASE_KEY='YOUR_SUPABASE_ANON_KEY';
function getCurrentWeekStart(){const n=new Date(),d=n.getUTCDay(),diff=d===0?6:d-1;const m=new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate()-diff,0,0,0));return m.toISOString().split('T')[0]}
async function getCountryCode(){if(userCountryCode&&userCountryCode!=='XX')return userCountryCode;const cached=localStorage.getItem('finger_country');if(cached&&cached!=='XX'){userCountryCode=cached;return userCountryCode}const apis=[{url:'https://ip2c.org/s',parse:t=>{const p=t.split(';');return p[0]==='1'?p[1]:null}},{url:'https://ipwho.is/',parse:j=>j.country_code||null},{url:'https://freeipapi.com/api/json',parse:j=>j.countryCode||null},{url:'https://ipapi.co/json/',parse:j=>j.country_code||null}];for(const api of apis){try{const r=await fetch(api.url,{signal:AbortSignal.timeout(3000)});const ct=r.headers.get('content-type')||'';const data=ct.includes('json')?await r.json():await r.text();const code=api.parse(data);if(code&&code.length===2){userCountryCode=code.toUpperCase();localStorage.setItem('finger_country',userCountryCode);return userCountryCode}}catch{continue}}userCountryCode='XX';return userCountryCode}
function countryToEmoji(c){if(!c||c==='XX')return'\ud83c\udf0d';return String.fromCodePoint(...[...c.toUpperCase()].map(ch=>0x1F1E6+ch.charCodeAt(0)-65))}
async function submitScore(totalSeconds){try{const cc=await getCountryCode(),ws=getCurrentWeekStart();const ex=await fetch(SUPABASE_URL+'/rest/v1/weekly_scores?player_id=eq.'+playerId+'&week_start=eq.'+ws+'&select=total_seconds',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});const rows=await ex.json();if(rows.length>0&&rows[0].total_seconds>=totalSeconds)return;await fetch(SUPABASE_URL+'/rest/v1/weekly_scores',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({player_id:playerId,week_start:ws,nickname:nickname||'ANON',country_code:cc,total_seconds:totalSeconds,created_at:new Date().toISOString()})})}catch(e){}}
async function fetchLeaderboard(){try{const ws=getCurrentWeekStart();const r=await fetch(SUPABASE_URL+'/rest/v1/weekly_scores?week_start=eq.'+ws+'&select=*&order=total_seconds.desc&limit=50',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});return await r.json()}catch{return[]}}
function updateWeeklyCountdown(){const n=new Date(),nm=new Date(n);nm.setUTCDate(n.getUTCDate()+((1+7-n.getUTCDay())%7||7));nm.setUTCHours(0,0,0,0);const d=nm-n,dd=Math.floor(d/864e5),hh=Math.floor(d%864e5/36e5),mm=Math.floor(d%36e5/6e4),ss=Math.floor(d%6e4/1e3);weeklyCountdown.textContent='RESETS IN '+dd+'D '+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')}
async function showLeaderboard(from='title'){leaderboardScreen.classList.remove('hidden');titleScreen.classList.add('hidden');deathScreen.classList.add('hidden');leaderboardScreen.dataset.from=from;leaderboardList.innerHTML='<div style="opacity:.3;text-align:center;padding:40px;font-family:Share Tech Mono,monospace;font-size:.7rem;letter-spacing:.15em">LOADING...</div>';updateWeeklyCountdown();const ci=setInterval(updateWeeklyCountdown,1000);leaderboardScreen.dataset.interval=ci;const data=await fetchLeaderboard();if(!data||!data.length){leaderboardList.innerHTML='<div style="opacity:.3;text-align:center;padding:40px;font-family:Share Tech Mono,monospace;font-size:.7rem;letter-spacing:.15em">NO SCORES YET<br>BE THE FIRST!</div>';myRankDisplay.textContent='';return}leaderboardList.innerHTML='';let myRank=-1;data.forEach((e,i)=>{const row=document.createElement('div'),isMe=e.player_id===playerId;row.className='lb-row'+(i<3?' top3':'')+(isMe?' me':'');row.innerHTML='<span class="lb-rank">#'+(i+1)+'</span><span class="lb-flag">'+countryToEmoji(e.country_code)+'</span><span class="lb-name">'+e.nickname+'</span><span class="lb-time">'+e.total_seconds+'s</span>';leaderboardList.appendChild(row);if(isMe&&myRank===-1)myRank=i+1});myRankDisplay.textContent=myRank>0?'YOU ARE #'+myRank+' WORLDWIDE':''}
document.getElementById('leaderboard-btn').addEventListener('click',()=>showLeaderboard('title'));
document.getElementById('ranking-btn').addEventListener('click',()=>showLeaderboard('death'));
document.getElementById('lb-back-btn').addEventListener('click',()=>{const f=leaderboardScreen.dataset.from||'title';leaderboardScreen.classList.add('hidden');if(leaderboardScreen.dataset.interval)clearInterval(parseInt(leaderboardScreen.dataset.interval));if(f==='death')deathScreen.classList.remove('hidden');else{titleScreen.classList.remove('hidden');updateTitleStats()}});
state.coreX=canvas.width/2;state.coreY=canvas.height/2;draw();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
